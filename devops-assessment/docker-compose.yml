version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hotel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-hoteldb}
      POSTGRES_USER:     ${POSTGRES_USER:-hoteluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotelpass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run SQL files in alphabetical order at first startup
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hoteluser} -d ${POSTGRES_DB:-hoteldb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_net

  # ── pgAdmin (optional UI) ───────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hotel_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@hotel.local
      PGADMIN_DEFAULT_PASSWORD: adminpass
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hotel_net
    profiles:
      - tools   

volumes:
  postgres_data:
    driver: local

networks:
  hotel_net:
    driver: bridge
