##############################################################################
# GitHub Actions – Terraform PR Checks
#
# Triggers on every Pull Request that touches infra/** files.
# Runs fmt → init → validate → plan for both dev and prod environments.
# Terraform plan output is posted back as a PR comment (one per environment).
##############################################################################

name: "Terraform PR Checks"

on:
  pull_request:
    paths:
      - "infra/**"
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write   # needed to post PR comments

env:
  TF_VERSION: "1.7.5"
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

jobs:
  # ── Dev Environment ─────────────────────────────────────────────────────────
  terraform-dev:
    name: "Terraform · dev"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -diff ../../..
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="dev.tfvars" \
            -refresh=false \
            -no-color \
            -out=tfplan-dev 2>&1 | tee plan-output-dev.txt
        continue-on-error: true

      - name: Post Plan Comment (dev)
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/envs/dev/plan-output-dev.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... [output truncated]'
              : plan;
            const icon = (o) => o === 'success' ? '✅' : '❌';
            const body = `## Terraform Plan · \`dev\`
            | Step | Status |
            |------|--------|
            | \`terraform fmt\`      | ${icon('${{ steps.fmt.outcome }}')} ${{ steps.fmt.outcome }} |
            | \`terraform init\`     | ${icon('${{ steps.init.outcome }}')} ${{ steps.init.outcome }} |
            | \`terraform validate\` | ${icon('${{ steps.validate.outcome }}')} ${{ steps.validate.outcome }} |
            | \`terraform plan\`     | ${icon('${{ steps.plan.outcome }}')} ${{ steps.plan.outcome }} |

            <details><summary>📋 Plan Output (click to expand)</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > Pusher: @${{ github.actor }} · Branch: \`${{ github.head_ref }}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfplan-dev
          path: infra/envs/dev/tfplan-dev
          retention-days: 5

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Prod Environment ─────────────────────────────────────────────────────────
  terraform-prod:
    name: "Terraform · prod"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -diff ../../..
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="prod.tfvars" \
            -refresh=false \
            -no-color \
            -out=tfplan-prod 2>&1 | tee plan-output-prod.txt
        continue-on-error: true

      - name: Post Plan Comment (prod)
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/envs/prod/plan-output-prod.txt', 'utf8');
            const maxLen = 60000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... [output truncated]'
              : plan;
            const icon = (o) => o === 'success' ? '✅' : '❌';
            const body = `## Terraform Plan · \`prod\`
            | Step | Status |
            |------|--------|
            | \`terraform fmt\`      | ${icon('${{ steps.fmt.outcome }}')} ${{ steps.fmt.outcome }} |
            | \`terraform init\`     | ${icon('${{ steps.init.outcome }}')} ${{ steps.init.outcome }} |
            | \`terraform validate\` | ${icon('${{ steps.validate.outcome }}')} ${{ steps.validate.outcome }} |
            | \`terraform plan\`     | ${icon('${{ steps.plan.outcome }}')} ${{ steps.plan.outcome }} |

            <details><summary>📋 Plan Output (click to expand)</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > Pusher: @${{ github.actor }} · Branch: \`${{ github.head_ref }}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfplan-prod
          path: infra/envs/prod/tfplan-prod
          retention-days: 5

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
